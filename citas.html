<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gestión de Citas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos globales -->
    <link rel="stylesheet" href="./View/CSS/usuarios.css">

    <!-- Estilos específicos de citas -->
    <link rel="stylesheet" href="./View/CSS/citas.css">

    <!-- Controlador -->
    <script defer src="./Controller/JavaScript/citas.js"></script>

</head>

<body>

    <!-- =====================================================
         HEADER
         Encabezado del sistema
    ====================================================== -->
    <header class="encabezado">

        <img src="./View/Img/ccss.png" alt="Logo CCSS" class="logo-ccss">

        <div class="titulo-header">

            <h1>Gestión de Citas</h1>

            <p>Agendá, cancelá o reprogramá tus citas médicas</p>

        </div>

    </header>


    <!-- =====================================================
         CONTENEDOR PRINCIPAL
    ====================================================== -->
    <main class="contenedor">


        <!-- =====================================================
             LISTA DE CITAS
        ====================================================== -->
        <section class="vista">

            <h2>Mis citas</h2>

            <div class="acciones">

                <button id="btnNuevaCita" class="btn btn-principal">
                    Agendar nueva cita
                </button>

                <a href="usuarios.html" class="btn btn-secundario">
                    Volver al inicio
                </a>

            </div>

            <!-- Aquí JavaScript cargará las citas -->
            <div id="listaCitas"></div>

        </section>


        <!-- =====================================================
             FORMULARIO DE CITA
        ====================================================== -->
        <section id="formularioCita" class="vista oculto">

            <form id="formCita" class="tarjeta">

                <h2>Agendar cita</h2>

                <label for="especialidad">Especialidad</label>
                <input type="text" id="especialidad" placeholder="Ej: Medicina general" required>

                <label for="motivo">Motivo</label>
                <input type="text" id="motivo" placeholder="Motivo de la consulta" required>

                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" required>

                <label for="hora">Hora</label>
                <input type="time" id="hora" required>

                <label for="prioridad">Prioridad</label>
                <select id="prioridad">

                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>

                </select>

                <!-- Mensaje dinámico -->
                <span id="mensajeCita" class="mensaje oculto"></span>


                <!-- Acciones del formulario -->
                <div class="acciones">

                    <button type="submit" class="btn btn-principal">
                        Guardar cita
                    </button>

                    <button type="button" id="btnCancelar" class="btn btn-secundario">
                        Volver
                    </button>

                </div>

            </form>

        </section>

    </main>

</body>

</html>
